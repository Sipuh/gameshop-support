<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="512" y2="512">
      <stop stop-color="#FF2BD6"></stop>
      <stop offset="0.5" stop-color="#7C4DFF"></stop>
      <stop offset="1" stop-color="#00E5FF"></stop>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="b"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- outer glow shape -->
  <path filter="url(#glow)" d="M140 280
           C140 210 190 170 260 170
           H270
           C340 170 390 210 390 280
           C390 340 350 380 320 380
           C300 380 295 360 256 360
           C217 360 212 380 192 380
           C162 380 140 340 140 280Z" stroke="url(#g)" stroke-width="18" fill="none"></path>

  <!-- main controller -->
  <path filter="url(#glow)" d="M145 280
           C145 220 190 190 255 190
           H267
           C332 190 377 220 377 280
           C377 330 345 360 320 360
           C300 360 295 340 256 340
           C217 340 212 360 192 360
           C167 360 145 330 145 280Z" stroke="url(#g)" stroke-width="14" fill="none"></path>

  <!-- buttons -->
  <circle cx="320" cy="250" r="14" fill="#FF2BD6"></circle>
  <circle cx="345" cy="280" r="14" fill="#00E5FF"></circle>
  <circle cx="320" cy="310" r="14" fill="#7C4DFF"></circle>
  <circle cx="295" cy="280" r="14" fill="#00FFB2"></circle>

  <!-- stick -->
  <circle cx="210" cy="285" r="22" stroke="url(#g)" stroke-width="8"></circle>
  <circle cx="210" cy="285" r="8" fill="#00E5FF"></circle>
</svg>